# =============================================================================
# Gnosis KB — Nginx reverse-proxy configuration
# =============================================================================
# Topology (all internal Docker network names):
#
#   nginx  :80 / :443  ←– public entry point
#     ├─ /          →  ui service  (React SPA, served from /usr/share/nginx/html)
#     ├─ /api/      →  api service :8010  (FastAPI)
#     └─ /health    →  api service :8010  (liveness probe)
#
# TLS:
#   - HTTP (port 80) always redirects to HTTPS.
#   - HTTPS (port 443) uses certs mounted at /etc/nginx/certs/.
#   - For local dev without certs, comment out the 443 server block and
#     change the port-80 block to listen 80 without the redirect.
# =============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- logging ----------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ---------- performance ----------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;
    gzip_min_length  1024;
    gzip_vary        on;

    # ---------- security headers (applied to every response) ----------
    add_header X-Frame-Options          "SAMEORIGIN"       always;
    add_header X-Content-Type-Options   "nosniff"          always;
    add_header X-XSS-Protection         "1; mode=block"    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    # Tighten CSP for production; relax script-src if you use inline scripts.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:;" always;

    # Hide Nginx version
    server_tokens off;

    # ---------- upstream definitions ----------
    upstream api_backend {
        server api:8010;
        keepalive 16;
    }

    # ---------- rate limiting ----------
    # Burst allows short spikes; nodelay serves them immediately.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=20r/m;

    # ==========================================================================
    # HTTP → HTTPS redirect
    # Comment this block and adjust the server below if running without TLS.
    # ==========================================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt / ACME challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # HTTPS — main server block
    # ==========================================================================
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # --- TLS ---
        # Mount your cert + key into the container at these paths.
        # For local self-signed dev certs: see docs/nginx-dev-tls.md
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:
                            ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:
                            ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (enable once you are confident TLS is permanent)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # --- client body size (for vault file uploads) ---
        client_max_body_size 50m;

        # ---- /health — API liveness probe (no rate limit) ----------------
        location = /health {
            proxy_pass         http://api_backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log         off;
        }

        # ---- /api/ — FastAPI backend -------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts generous for LLM / RAG calls
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # SSE / streaming responses (vault-sync progress, chat)
            proxy_buffering       off;
            proxy_cache           off;
        }

        # Extra tight rate-limit on semantic search endpoint
        location /api/search/semantic {
            limit_req zone=search_limit burst=5 nodelay;

            proxy_pass         http://api_backend/api/search/semantic;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_read_timeout 60s;
        }

        # ---- / — React SPA (served from ui container's /usr/share/nginx/html) ---
        # NOTE: Because the ui container already runs its own nginx, we proxy
        # to it rather than serving static files directly here.  This keeps
        # the frontend Dockerfile self-contained and avoids duplicating the
        # dist/ build artefact into this container.
        location / {
            proxy_pass         http://ui:3010;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Cache static assets aggressively; HTML never cached
            proxy_cache_bypass $http_cache_control;
            expires            off;
        }

        # --- static asset cache headers (passed through from ui) ---
        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp|avif)$ {
            proxy_pass         http://ui:3010;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires            1y;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }
    }
}
