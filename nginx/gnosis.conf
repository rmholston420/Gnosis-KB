# Gnosis Nginx reverse-proxy configuration (HTTP — redirect to HTTPS in prod)
server {
    listen 80;
    server_name _;

    # Security headers (CSP, HSTS, etc.)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; worker-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Frontend
    location / {
        proxy_pass         http://gnosis-ui:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://gnosis-api:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE support
        proxy_read_timeout  3600;
        proxy_buffering     off;
        proxy_cache         off;
    }

    # MCP server
    location /mcp {
        proxy_pass         http://gnosis-api:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Docs
    location /docs {
        proxy_pass http://gnosis-api:8010;
    }
    location /openapi.json {
        proxy_pass http://gnosis-api:8010;
    }
}
