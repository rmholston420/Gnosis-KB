# Gnosis Nginx reverse-proxy configuration
# HTTP block redirects to HTTPS in production; handles plain HTTP in dev.

# Hide Nginx version from all response headers
server_tokens off;

server {
    listen 80;
    server_name _;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/html
        text/plain
        text/xml;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; worker-src 'self' blob:;"
        always;
    # HSTS: 1 year, include subdomains — enable once TLS is confirmed working
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Frontend ────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://gnosis-ui:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://gnosis-api:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Forward the client-generated request ID (or let the API generate one)
        proxy_set_header   X-Request-ID      $request_id;
        # SSE support
        proxy_read_timeout  3600;
        proxy_buffering     off;
        proxy_cache         off;
        # Body size limit — 50 MB for document ingest
        client_max_body_size 50m;
    }

    # ── MCP server ──────────────────────────────────────────────────────────
    location /mcp {
        proxy_pass         http://gnosis-api:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Docs ────────────────────────────────────────────────────────────────
    location /docs {
        proxy_pass http://gnosis-api:8010;
    }
    location /openapi.json {
        proxy_pass http://gnosis-api:8010;
    }

    # ── ACME challenge (Let's Encrypt renewal) ──────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
