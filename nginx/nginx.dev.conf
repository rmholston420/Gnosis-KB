# =============================================================================
# Gnosis KB — Nginx config for LOCAL DEVELOPMENT (no TLS)
# =============================================================================
# Use this when running docker-compose locally without SSL certs.
# Access the app at http://localhost:8003
# (Port 8080 is reserved for Open WebUI on this machine.)
# =============================================================================

worker_processes 1;
error_log /dev/stdout warn;

events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    server_tokens off;

    upstream api_backend { server api:8010; keepalive 8; }

    server {
        listen 8003;
        server_name localhost;

        client_max_body_size 50m;

        location = /health {
            proxy_pass http://api_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location /api/ {
            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   Connection       "";
            proxy_buffering    off;
            proxy_read_timeout 120s;
        }

        location / {
            proxy_pass         http://ui:3010;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   Connection       "";
        }
    }
}
