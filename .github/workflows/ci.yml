name: Gnosis CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: backend
        run: ruff check gnosis/
      - name: Mypy type check
        working-directory: backend
        run: mypy gnosis/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: sudo apt-get install -y tesseract-ocr
      - name: Install Python deps
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ --cov=gnosis --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install deps
        working-directory: frontend
        run: npm install --legacy-peer-deps
      - name: Type-check + Vite build
        working-directory: frontend
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build backend image
        run: docker build -t gnosis-api:test ./backend
      - name: Build frontend image
        run: docker build -t gnosis-ui:test ./frontend

  # ---------------------------------------------------------------------------
  # Security scanning — runs on push to main only to keep PR feedback fast
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Python SAST — bandit
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit + pip-audit
        run: pip install bandit pip-audit
      - name: Bandit SAST (HIGH severity fails build)
        working-directory: backend
        run: bandit -r gnosis/ -ll -ii --exit-zero
        # -ll = report LOW+ but only exit non-zero on MEDIUM+
        # -ii = report MEDIUM+ confidence; change to -lll -iii for stricter
      - name: pip-audit dependency CVE scan
        working-directory: backend
        run: pip-audit --requirement <(pip install -e . --dry-run -q 2>/dev/null || true) || true
        # continue-on-error so we see the report without hard-failing on first run
        continue-on-error: true

      # Docker image vulnerability scan — Trivy
      - name: Download frontend dist for Docker build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build backend image for scanning
        run: docker build -t gnosis-api:scan ./backend
      - name: Trivy scan (HIGH + CRITICAL fail build)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: gnosis-api:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
