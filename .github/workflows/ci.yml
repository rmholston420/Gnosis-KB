name: Gnosis CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: backend
        run: ruff check gnosis/
      - name: Mypy type check
        working-directory: backend
        run: mypy gnosis/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: sudo apt-get install -y tesseract-ocr
      - name: Install Python deps
        working-directory: backend
        run: |
          pip install aiosqlite
          pip install -e ".[dev]"
      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ --cov=gnosis --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t gnosis-api:test ./backend
      - name: Build frontend image
        run: docker build -t gnosis-ui:test ./frontend
