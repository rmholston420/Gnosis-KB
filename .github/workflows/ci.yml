# Gnosis-KB CI
# Runs on every push to main and on every pull request.
#
# Jobs:
#   backend  — pytest with a SQLite in-memory test DB
#   frontend — TypeScript type-check (tsc --noEmit) + Vite production build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend — pytest
  # ---------------------------------------------------------------------------
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # Use SQLite for tests so no Postgres service is required
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      # Disable Qdrant / LightRAG / Ollama in test environment
      QDRANT_URL: ""
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: "test-key"
      JWT_SECRET_KEY: "ci-test-secret-key-32-chars-minimum"
      VAULT_PATH: "/tmp/gnosis-vault-ci"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the package in editable mode with all dev extras.
          # [dev] includes: pytest, pytest-asyncio, pytest-cov, httpx, anyio,
          # ruff, mypy — plus aiosqlite is already in the main dependencies.
          pip install -e ".[dev]"

      - name: Create vault directory
        run: mkdir -p /tmp/gnosis-vault-ci/10-zettelkasten

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --asyncio-mode=auto \
            --cov=gnosis \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=50

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript + Vite build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend build (tsc + vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npx vite build
        env:
          # Vite needs some env vars to be defined at build time
          VITE_API_BASE_URL: "/api/v1"
