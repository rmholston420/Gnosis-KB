name: Gnosis CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: backend
        run: ruff check gnosis/
      - name: Mypy type check
        working-directory: backend
        run: mypy gnosis/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: sudo apt-get install -y tesseract-ocr
      - name: Install Python deps
        working-directory: backend
        # aiosqlite is already in [dev] extras — no separate pip install needed
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ --cov=gnosis --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install deps
        working-directory: frontend
        run: npm install --legacy-peer-deps
      - name: Type-check + Vite build
        working-directory: frontend
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-build]          # wait for npm build to succeed first
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build backend image
        run: docker build -t gnosis-api:test ./backend
      - name: Build frontend image
        # dist/ is already present from the frontend-build job so
        # the Docker layer that copies it will succeed without re-running npm.
        run: docker build -t gnosis-ui:test ./frontend
