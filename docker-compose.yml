name: gnosis-kb

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gnosis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gnosis}
      POSTGRES_USER: ${POSTGRES_USER:-gnosis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnosis_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gnosis}']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: gnosis-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6335:6333'
      - '6336:6334'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gnosis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gnosis}:${POSTGRES_PASSWORD:-gnosis_secret}@postgres:5432/${POSTGRES_DB:-gnosis}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-gnosis}:${POSTGRES_PASSWORD:-gnosis_secret}@postgres:5432/${POSTGRES_DB:-gnosis}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: gnosis_notes
      VAULT_PATH: /vault
      LIGHTRAG_WORKING_DIR: /lightrag
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-mistral}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-in-production}
      # In production, Nginx handles CORS at the proxy layer.
      # CORS_ORIGINS here covers direct API access (dev / health checks).
      CORS_ORIGINS: '["http://localhost:3010","http://localhost:5173","http://localhost:8080"]'
    volumes:
      - vault_data:/vault
      - lightrag_data:/lightrag
    # Port is intentionally NOT exposed to the host in production; all
    # traffic routes through the nginx service.  Uncomment for direct
    # backend access during development.
    # ports:
    #   - '8010:8010'

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gnosis-ui
    restart: unless-stopped
    depends_on:
      - api
    # Port is intentionally NOT exposed; nginx proxies to ui:3010 internally.
    # ports:
    #   - '3010:3010'

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy — the single public entry point
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: gnosis-nginx
    restart: unless-stopped
    depends_on:
      - api
      - ui
    ports:
      - '80:80'        # HTTP (redirects to HTTPS in production)
      - '443:443'      # HTTPS (production)
      - '8080:8080'    # Dev plain-HTTP port (nginx.dev.conf only)
    volumes:
      # Production config (TLS).  Switch to nginx.dev.conf for local dev.
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates: mount your Let's Encrypt / ACME certs here.
      # For local dev, comment these two lines and use nginx.dev.conf.
      - ${TLS_CERT_DIR:-./nginx/certs}:/etc/nginx/certs:ro
      # ACME challenge directory for Let's Encrypt auto-renewal
      - certbot_webroot:/var/www/certbot:ro
      # Persist logs
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8080/health']
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  qdrant_data:
  vault_data:
  lightrag_data:
  certbot_webroot:
  nginx_logs:
