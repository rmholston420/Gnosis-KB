name: gnosis-kb

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gnosis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gnosis}
      POSTGRES_USER: ${POSTGRES_USER:-gnosis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnosis_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gnosis}']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: gnosis-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6335:6333'
      - '6336:6334'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gnosis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gnosis}:${POSTGRES_PASSWORD:-gnosis_secret}@postgres:5432/${POSTGRES_DB:-gnosis}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-gnosis}:${POSTGRES_PASSWORD:-gnosis_secret}@postgres:5432/${POSTGRES_DB:-gnosis}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: gnosis_notes
      VAULT_PATH: /vault
      LIGHTRAG_WORKING_DIR: /lightrag
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-mistral}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-in-production}
      CORS_ORIGINS: '["http://localhost:3010","http://localhost:5173","http://localhost:8080"]'
      LOG_FORMAT: ${LOG_FORMAT:-text}
    volumes:
      - vault_data:/vault
      - lightrag_data:/lightrag
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8010/api/v1/health/ping || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Port intentionally NOT exposed; all traffic routes through nginx.
    # ports:
    #   - '8010:8010'

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gnosis-ui
    restart: unless-stopped
    depends_on:
      - api
    # ports:
    #   - '3010:3010'

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy — the single public entry point
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: gnosis-nginx
    restart: unless-stopped
    depends_on:
      - api
      - ui
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'
    volumes:
      - ./nginx/gnosis.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_DIR:-./nginx/certs}:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:80/']
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Automated PostgreSQL backup (runs daily via supercronic)
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: gnosis-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-gnosis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnosis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gnosis}
      BACKUP_DIR: /backups
      RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_data:/backups
    # Run backup at 02:00 UTC daily using sh -c + sleep loop
    # (avoids adding a cron daemon to the image)
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo 'Backup service started. First run in 60 s, then every 24 h.'
        sleep 60
        while true; do
          sh /backup.sh
          sleep 86400
        done

volumes:
  postgres_data:
  qdrant_data:
  vault_data:
  lightrag_data:
  certbot_webroot:
  nginx_logs:
  backup_data:
