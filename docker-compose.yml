name: gnosis-kb

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gnosis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gnosis}
      POSTGRES_USER: ${POSTGRES_USER:-gnosis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnosis_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gnosis}']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: gnosis-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6335:6333'
      - '6336:6334'
    healthcheck:
      # Qdrant image has wget but not curl
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6333/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gnosis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gnosis}:${POSTGRES_PASSWORD:-gnosis_secret}@postgres:5432/${POSTGRES_DB:-gnosis}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-gnosis}:${POSTGRES_PASSWORD:-gnosis_secret}@postgres:5432/${POSTGRES_DB:-gnosis}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: gnosis_notes
      VAULT_PATH: /vault
      LIGHTRAG_WORKING_DIR: /lightrag
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-mistral}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-in-production}
      CORS_ORIGINS: '["http://localhost:3010","http://localhost:5173"]'
    volumes:
      - vault_data:/vault
      - lightrag_data:/lightrag
    ports:
      - '8010:8010'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8010/health/']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gnosis-ui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3010:3010'

volumes:
  postgres_data:
  qdrant_data:
  vault_data:
  lightrag_data:
