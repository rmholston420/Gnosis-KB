[mypy]
python_version = 3.13
ignore_missing_imports = True
warn_unused_ignores = False
no_error_summary = False

# Third-party libraries without complete stubs — suppress at module level
[mypy-qdrant_client.*]
ignore_errors = True

[mypy-fastembed.*]
ignore_errors = True

[mypy-watchdog.*]
ignore_errors = True

[mypy-lightrag.*]
ignore_errors = True

[mypy-slowapi.*]
ignore_errors = True

[mypy-mistune.*]
ignore_errors = True

# gnosis modules that use these third-party libraries directly
[mypy-gnosis.services.hybrid_search]
ignore_errors = True

[mypy-gnosis.services.vault_sync]
ignore_errors = True

[mypy-gnosis.main]
ignore_errors = True
